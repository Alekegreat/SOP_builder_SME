name = "sop-builder-worker"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# ── Default (production) bindings ──
[[d1_databases]]
binding = "DB"
database_name = "sop-builder-db"
database_id = "ee833f4f-bb13-44b6-8842-f74b1f61a4d3"

[[r2_buckets]]
binding = "R2"
bucket_name = "sop-builder-exports"

[[queues.producers]]
binding = "QUEUE"
queue = "sop-jobs"

[vars]
ENVIRONMENT = "production"
ENV_NAME = "production"
FEATURE_FLAGS = "{}"

# ── Preview environment ──
[env.preview]
name = "sop-builder-worker-preview"

[env.preview.vars]
ENVIRONMENT = "preview"
ENV_NAME = "preview"
PREVIEW_NAMESPACE = "preview"
FEATURE_FLAGS = "{}"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "sop-builder-db"
database_id = "ee833f4f-bb13-44b6-8842-f74b1f61a4d3"

[[env.preview.r2_buckets]]
binding = "R2"
bucket_name = "sop-builder-exports"

[[env.preview.queues.producers]]
binding = "QUEUE"
queue = "sop-jobs"

# Secrets (set via wrangler secret put):
# BOT_TOKEN
# BOT_WEBHOOK_SECRET
# JWT_SECRET
# ENCRYPTION_KEY
