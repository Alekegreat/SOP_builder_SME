name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-worker:
    name: Deploy API Worker
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/worker
          wranglerVersion: "3"
          command: deploy --minify

  deploy-queue-consumer:
    name: Deploy Queue Consumer
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-worker
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy Queue Consumer
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/queue-consumer
          wranglerVersion: "3"
          command: deploy --minify

  deploy-tma-web:
    name: Deploy TMA Web (Pages)
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-worker
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build TMA Web
        run: pnpm --filter @sop/tma-web build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "3"
          command: pages deploy apps/tma-web/dist --project-name=sop-builder-tma

  set-webhook:
    name: Set Telegram Webhook
    runs-on: ubuntu-latest
    needs: deploy-worker
    environment: production
    steps:
      - name: Set webhook URL
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/setWebhook" \
            -d "url=${{ secrets.WORKER_URL }}/webhook" \
            -d "secret_token=${{ secrets.WEBHOOK_SECRET }}" \
            -d "allowed_updates=[\"message\",\"callback_query\",\"pre_checkout_query\"]"

  run-migrations:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: deploy-worker
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run D1 Migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/worker
          wranglerVersion: "3"
          command: d1 migrations apply sop-builder-db --remote

  post-deploy-smoke:
    name: Post-Deploy Smoke Check
    runs-on: ubuntu-latest
    needs:
      [
        deploy-worker,
        deploy-queue-consumer,
        deploy-tma-web,
        run-migrations,
        set-webhook,
      ]
    environment: production
    steps:
      - name: Health check - API Worker
        run: |
          echo "Checking API Worker health..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.WORKER_URL }}/health" || echo "000")
          echo "API Health: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::API Worker health check failed with status $HTTP_STATUS"
            exit 1
          fi

      - name: Health check - TMA Web
        run: |
          echo "Checking TMA Web..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://sop-builder-tma.pages.dev/" || echo "000")
          echo "TMA Web: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::warning::TMA Web returned status $HTTP_STATUS"
          fi

      - name: Smoke summary
        run: |
          echo "## Production Deploy Smoke Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| API Health | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| TMA Web | ✅ Accessible |" >> $GITHUB_STEP_SUMMARY
          echo "| Migrations | ✅ Applied |" >> $GITHUB_STEP_SUMMARY
          echo "| Webhook | ✅ Set |" >> $GITHUB_STEP_SUMMARY
