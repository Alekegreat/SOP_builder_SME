name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-worker:
    name: Deploy API Worker
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy Worker
        run: pnpm --filter @sop/worker exec wrangler deploy --minify
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-queue-consumer:
    name: Deploy Queue Consumer
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-worker
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy Queue Consumer
        run: pnpm --filter @sop/queue-consumer exec wrangler deploy --minify
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-tma-web:
    name: Deploy TMA Web (Pages)
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-worker
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build TMA Web
        run: pnpm --filter @sop/tma-web build

      - name: Deploy to Cloudflare Pages
        run: pnpm --filter @sop/worker exec wrangler pages deploy ../tma-web/dist --project-name=sop-builder-tma
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  set-webhook:
    name: Set Telegram Webhook
    runs-on: ubuntu-latest
    needs: deploy-worker
    environment: production
    steps:
      - name: Set webhook URL
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$WORKER_URL" ]; then
            echo "::warning::TELEGRAM_BOT_TOKEN or WORKER_URL not set — skipping webhook registration"
            exit 0
          fi
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
            -d "url=${WORKER_URL}/webhook" \
            -d "secret_token=${WEBHOOK_SECRET}" \
            -d "allowed_updates=[\"message\",\"callback_query\",\"pre_checkout_query\"]"

  run-migrations:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: deploy-worker
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run D1 Migrations
        run: pnpm --filter @sop/worker exec wrangler d1 migrations apply sop-builder-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  post-deploy-smoke:
    name: Post-Deploy Smoke Check
    runs-on: ubuntu-latest
    needs: [deploy-worker, deploy-queue-consumer, deploy-tma-web, run-migrations, set-webhook]
    environment: production
    steps:
      - name: Health check - API Worker
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: |
          if [ -z "$WORKER_URL" ]; then
            echo "::warning::WORKER_URL secret not set — skipping health check"
            exit 0
          fi
          echo "Checking API Worker health..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$WORKER_URL/health" || echo "000")
          echo "API Health: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::API Worker health check failed with status $HTTP_STATUS"
            exit 1
          fi

      - name: Health check - TMA Web
        run: |
          echo "Checking TMA Web..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://sop-builder-tma.pages.dev/" || echo "000")
          echo "TMA Web: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::warning::TMA Web returned status $HTTP_STATUS"
          fi

      - name: Smoke summary
        run: |
          echo "## Production Deploy Smoke Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| API Health | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| TMA Web | ✅ Accessible |" >> $GITHUB_STEP_SUMMARY
          echo "| Migrations | ✅ Applied |" >> $GITHUB_STEP_SUMMARY
          echo "| Webhook | ✅ Set |" >> $GITHUB_STEP_SUMMARY
