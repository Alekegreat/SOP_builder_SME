name: Preview Deploy + E2E

on:
  pull_request:
    branches: [main]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-pages-preview:
    name: Deploy Pages Preview
    runs-on: ubuntu-latest
    outputs:
      pages_url: ${{ steps.pages_deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build TMA Web
        run: pnpm --filter @sop/tma-web build

      - name: Deploy Pages Preview
        id: pages_deploy
        run: |
          OUTPUT=$(pnpm exec wrangler pages deploy apps/tma-web/dist \
            --project-name=sop-builder-tma \
            --branch=pr-${{ github.event.pull_request.number }} 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oP 'https://[^\s]+\.pages\.dev' | tail -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-workers-preview:
    name: Deploy Workers Preview
    runs-on: ubuntu-latest
    outputs:
      worker_url: ${{ steps.worker_deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy API Worker (preview)
        id: worker_deploy
        run: |
          OUTPUT=$(pnpm --filter @sop/worker exec wrangler deploy --env preview --minify 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oP 'https://[^\s]+\.workers\.dev' | tail -1)
          echo "url=${URL:-https://sop-builder-worker-preview.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev}" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PREVIEW_NAMESPACE: pr-${{ github.event.pull_request.number }}

      - name: Deploy Queue Consumer (preview)
        run: pnpm --filter @sop/queue-consumer exec wrangler deploy --env preview --minify
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PREVIEW_NAMESPACE: pr-${{ github.event.pull_request.number }}

  run-e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: [deploy-pages-preview, deploy-workers-preview]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          TMA_BASE_URL: ${{ needs.deploy-pages-preview.outputs.pages_url }}
          API_BASE_URL: ${{ needs.deploy-workers-preview.outputs.worker_url }}
          PREVIEW_NAMESPACE: pr-${{ github.event.pull_request.number }}

      - name: Upload E2E results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results
          path: test-results/
          retention-days: 7

      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: playwright-report/
          retention-days: 7

  preview-summary:
    name: Preview Summary
    runs-on: ubuntu-latest
    needs: [deploy-pages-preview, deploy-workers-preview, run-e2e]
    if: always()
    steps:
      - name: Print preview URLs
        run: |
          echo "## Preview Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| TMA Web | ${{ needs.deploy-pages-preview.outputs.pages_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Worker | ${{ needs.deploy-workers-preview.outputs.worker_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Namespace | pr-${{ github.event.pull_request.number }} |" >> $GITHUB_STEP_SUMMARY
